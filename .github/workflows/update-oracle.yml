name: Update ETN/USD Oracle

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch + compute only, no on-chain write)'
        type: boolean
        default: true

jobs:
  update-oracle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/oracle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node update-oracle.js
        env:
          ORACLE_ADDRESS: ${{ secrets.ORACLE_ADDRESS }}
          ORACLE_OWNER_PRIVATE_KEY: ${{ secrets.ORACLE_OWNER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.ETN_RPC_URL }}
          DRY_RUN: ${{ inputs.dry_run }}
